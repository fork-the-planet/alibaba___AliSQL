name: build-and-release
run-name: AliSQL release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - 'AliSQL-8.0.*'
      - 'AliSQL-5.7.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing AliSQL tag to build or retry'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE: songhuaxiong/alisql
  DOCKER_REPOSITORY: p1p1bear/alisql-docker

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      tag:     ${{ steps.p.outputs.tag }}
      version: ${{ steps.p.outputs.version }}
      major:   ${{ steps.p.outputs.major }}
      minor:   ${{ steps.p.outputs.minor }}
      patch:   ${{ steps.p.outputs.patch }}
      extra:   ${{ steps.p.outputs.extra }}
    steps:
      - id: p
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$REQUESTED_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi

          if [[ "$TAG" =~ ^AliSQL-([0-9]+)\.([0-9]+)\.([0-9]+)-([0-9A-Za-z][0-9A-Za-z._-]*)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            EXTRA="${BASH_REMATCH[4]}"
          else
            echo "Invalid tag: ${TAG}" >&2
            exit 1
          fi

          case "${MAJOR}.${MINOR}" in
            8.0|5.7) ;;
            *)
              echo "Unsupported AliSQL series: ${MAJOR}.${MINOR}" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#AliSQL-}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
            echo "patch=$PATCH"
            echo "extra=$EXTRA"
          } >> "$GITHUB_OUTPUT"
          echo "Parsed: version=$VERSION major=$MAJOR minor=$MINOR patch=$PATCH extra=$EXTRA"

  build:
    needs: parse
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            cmake_arch: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            cmake_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse.outputs.tag }}
          fetch-depth: 1

      - name: Build inside oraclelinux:7
        env:
          MAJOR:      ${{ needs.parse.outputs.major }}
          MINOR:      ${{ needs.parse.outputs.minor }}
          PATCH:      ${{ needs.parse.outputs.patch }}
          EXTRA:      ${{ needs.parse.outputs.extra }}
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: |
          set -eux
          mkdir -p "${GITHUB_WORKSPACE}/out"
          docker run --rm -i \
            -v "${GITHUB_WORKSPACE}:/AliSQL" \
            -v "${GITHUB_WORKSPACE}/out:/out" \
            -e MAJOR -e MINOR -e PATCH -e EXTRA -e CMAKE_ARCH \
            oraclelinux:7 \
            bash -ex <<'INNER'

          # ---- Toolchain repo (devtoolset-10) ----
          cat >/etc/yum.repos.d/ol7-scl.repo <<'REPO'
          [ol7_software_collections]
          name=Oracle Linux 7 Software Collections ($basearch)
          baseurl=https://yum.oracle.com/repo/OracleLinux/OL7/SoftwareCollections/$basearch/
          gpgcheck=1
          enabled=1
          gpgkey=https://yum.oracle.com/RPM-GPG-KEY-oracle-ol7
          REPO

          yum clean all
          yum makecache
          yum install -y git wget \
            devtoolset-10-gcc devtoolset-10-gcc-c++ devtoolset-10-binutils \
            openssl openssl-devel ncurses-devel libaio-devel perl-IPC-Cmd bison

          # ---- CMake ----
          cd /opt
          wget -q "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-linux-${CMAKE_ARCH}.tar.gz"
          tar -xzf "cmake-3.28.6-linux-${CMAKE_ARCH}.tar.gz"
          export PATH="/opt/cmake-3.28.6-linux-${CMAKE_ARCH}/bin:$PATH"
          cmake --version

          # ---- Inject version from tag ----
          # 8.0 branch uses MYSQL_VERSION; 5.7 branch uses VERSION; same internal format.
          cd /AliSQL
          VERSION_FILE=""
          for f in MYSQL_VERSION VERSION; do
            [ -f "$f" ] && VERSION_FILE="$f" && break
          done
          if [ -z "$VERSION_FILE" ]; then
            echo "ERROR: neither MYSQL_VERSION nor VERSION found in source root" >&2
            exit 1
          fi
          sed -i \
            -e "s/^MYSQL_VERSION_MAJOR=.*/MYSQL_VERSION_MAJOR=${MAJOR}/" \
            -e "s/^MYSQL_VERSION_MINOR=.*/MYSQL_VERSION_MINOR=${MINOR}/" \
            -e "s/^MYSQL_VERSION_PATCH=.*/MYSQL_VERSION_PATCH=${PATCH}/" \
            -e "s/^MYSQL_VERSION_EXTRA=.*/MYSQL_VERSION_EXTRA=-${EXTRA}/" \
            "$VERSION_FILE"
          echo "--- ${VERSION_FILE} after injection ---"
          cat "$VERSION_FILE"

          # ---- Build & install ----
          source /opt/rh/devtoolset-10/enable
          sh build.sh -t release -d /opt/alisql
          make install

          # ---- Package ----
          cd /opt
          VER="${MAJOR}.${MINOR}.${PATCH}-${EXTRA}"
          GLIBC="glibc$(ldd --version | awk 'NR==1{print $NF}')"
          ARCH="$(uname -m)"
          PKG="alisql-${VER}-linux-${GLIBC}-${ARCH}.tar.xz"
          TOPDIR="${PKG%.tar.xz}"
          XZ_OPT='-T0 -9' tar -cJf "/out/${PKG}" \
            --transform="s,^alisql,${TOPDIR}," \
            --exclude='alisql/mysql-test' \
            --exclude='alisql/run' \
            --exclude='alisql/var' \
            --exclude='alisql/LICENSE-test' \
            --exclude='alisql/LICENSE.router' \
            --exclude='alisql/README-test' \
            --exclude='alisql/README.router' \
            --exclude='alisql/mysqlrouter-log-rotate' \
            alisql/
          ls -lh "/out/${PKG}"
          INNER

      - uses: actions/upload-artifact@v4
        with:
          name: alisql-${{ matrix.arch }}
          path: ${{ github.workspace }}/out/alisql-*.tar.xz
          retention-days: 7

  release:
    needs: [parse, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release changelog
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse.outputs.tag }}
          persist-credentials: false
          sparse-checkout: wiki/changes/changes-in-alisql-8.0.44.2026-06-30-en.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create or update release with tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ needs.parse.outputs.tag }}
          VERSION:  ${{ needs.parse.outputs.version }}
        run: |
          set -euo pipefail

          X86_PACKAGE="alisql-${VERSION}-linux-glibc2.17-x86_64.tar.xz"
          ARM_PACKAGE="alisql-${VERSION}-linux-glibc2.17-aarch64.tar.xz"
          CHANGELOG_FILE="wiki/changes/changes-in-alisql-8.0.44.2026-06-30-en.md"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          test -f "artifacts/${X86_PACKAGE}"
          test -f "artifacts/${ARM_PACKAGE}"
          if [[ "$VERSION" == 8.0.44-* ]]; then
            test -f "$CHANGELOG_FILE"
          fi

          {
            printf '# AliSQL %s\n\n' "$VERSION"
            printf 'Prebuilt AliSQL binaries and Docker images for this release. / 本次发布提供 AliSQL 预编译二进制包和 Docker 镜像。\n\n'
            printf '## Binary packages / 二进制包\n\n'
            printf '| Platform | Package |\n'
            printf '| --- | --- |\n'
            printf '| Linux x86_64 (glibc 2.17) | [%s](https://github.com/%s/releases/download/%s/%s) |\n' "$X86_PACKAGE" "$GITHUB_REPOSITORY" "$TAG" "$X86_PACKAGE"
            printf '| Linux aarch64 (glibc 2.17) | [%s](https://github.com/%s/releases/download/%s/%s) |\n\n' "$ARM_PACKAGE" "$GITHUB_REPOSITORY" "$TAG" "$ARM_PACKAGE"
            printf '## Docker image / Docker 镜像\n\n'
            printf 'The multi-architecture image supports linux/amd64 and linux/arm64. It is published after the binary packages are available.\n\n'
            printf -- '- Image: [%s:%s](https://hub.docker.com/r/%s/tags?name=%s)\n' "$DOCKER_IMAGE" "$VERSION" "$DOCKER_IMAGE" "$VERSION"
            printf -- '- Build: [GitHub Actions](https://github.com/%s/actions/workflows/build.yml)\n\n' "$DOCKER_REPOSITORY"
            printf '    docker pull %s:%s\n' "$DOCKER_IMAGE" "$VERSION"

            if [[ "$VERSION" == 8.0.44-* ]]; then
              printf '\n## English changelog\n\n'
              printf '[Standalone English changelog](https://github.com/%s/blob/%s/%s) | [中文变更说明](https://github.com/%s/blob/%s/wiki/changes/changes-in-alisql-8.0.44.2026-06-30-zh.md)\n\n' "$GITHUB_REPOSITORY" "$TAG" "$CHANGELOG_FILE" "$GITHUB_REPOSITORY" "$TAG"
              sed -n '5,$ { s/^### /#### /; s/^## /### /; p; }' "$CHANGELOG_FILE"
            fi
          } > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "artifacts/${X86_PACKAGE}" \
              "artifacts/${ARM_PACKAGE}"
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              "artifacts/${X86_PACKAGE}" \
              "artifacts/${ARM_PACKAGE}"
          fi

  # The Docker build downloads these release assets, so it must run afterwards.
  trigger-docker:
    needs: [parse, release]
    runs-on: ubuntu-latest
    steps:
      - name: Push release tag to the Docker repository
        env:
          PAT: ${{ secrets.DOCKER_REPO_PAT }}
          TAG: ${{ needs.parse.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "$PAT" ]]; then
            echo "DOCKER_REPO_PAT is not configured." >&2
            exit 1
          fi

          REPOSITORY_URL="https://x-access-token:${PAT}@github.com/${DOCKER_REPOSITORY}.git"
          git clone --depth 1 "$REPOSITORY_URL" docker-repository
          cd docker-repository

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists in ${DOCKER_REPOSITORY}; skipping."
            exit 0
          fi

          git tag "$TAG"
          git push origin "refs/tags/${TAG}"

          {
            echo "Docker build triggered for ${DOCKER_IMAGE}:${TAG#AliSQL-}."
            echo "https://github.com/${DOCKER_REPOSITORY}/actions/workflows/build.yml"
          } >> "$GITHUB_STEP_SUMMARY"
